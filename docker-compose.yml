services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - ai-net

  model-init:
    image: ollama/ollama
    container_name: ollama-model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHAT_MODELS=${CHAT_MODELS:-}
      - REASONING_MODELS=${REASONING_MODELS:-}
      - AUTOCOMPLETE_MODELS=${AUTOCOMPLETE_MODELS:-}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "/scripts/pull-models.sh"]
    volumes:
      - ./scripts/pull-models.sh:/scripts/pull-models.sh:ro
    restart: "no"
    networks:
      - ai-net

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - ai-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8801:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-net

  indexer:
    build: ./indexer
    container_name: ai-indexer
    volumes:
      - ./projects:/projects
      - fastembed_cache:/app/cache
    environment:
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - COLLECTION_NAME=${COLLECTION_NAME:-codebase}
      - PROJECTS_DIR=/projects
      - SCAN_INTERVAL=${SCAN_INTERVAL:-60}
      - HYBRID_ENABLED=${HYBRID_ENABLED:-true}
      - SPARSE_MODEL=${SPARSE_MODEL:-Qdrant/bm25}
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - ai-net

  rag-api:
    build: ./rag-api
    container_name: ai-rag-api
    ports:
      - "8011:8011"
    volumes:
      - fastembed_cache:/app/cache
    environment:
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - COLLECTION_NAME=${COLLECTION_NAME:-codebase}
      - HYBRID_ENABLED=${HYBRID_ENABLED:-true}
      - SPARSE_MODEL=${SPARSE_MODEL:-Qdrant/bm25}
      - RERANK_ENABLED=${RERANK_ENABLED:-true}
      - RERANK_MODEL=${RERANK_MODEL:-Xenova/ms-marco-MiniLM-L-6-v2}
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
      indexer:
        condition: service_started
    restart: unless-stopped
    networks:
      - ai-net

  mcp-rag:
    build: ./mcp-server
    image: ollama-ai-mcp-rag:latest
    container_name: ai-mcp-rag
    profiles:
      - mcp
    environment:
      - RAG_API_URL=http://ai-rag-api:8011
    stdin_open: true
    tty: false
    restart: "no"
    networks:
      - ai-net

  mcp-filesystem:
    image: node:22-alpine
    container_name: mcp-filesystem
    profiles:
      - mcp
    working_dir: /app
    command: >
      sh -c "
      npx -y @modelcontextprotocol/server-filesystem /projects
      "
    volumes:
      - ./projects:/projects
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - ai-net

volumes:
  ollama_data:
  qdrant_data:
  fastembed_cache:

networks:
  ai-net:
    driver: bridge
